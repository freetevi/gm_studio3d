<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | Studio3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="noise"></div>

  <main class="admin-main">
    <section id="login-card" class="admin-card">
      <h1>Painel Admin Studio3D</h1>
      <p>Somente voce deve acessar esta area.</p>
      <form id="login-form" class="admin-form">
        <label>Email</label>
        <input id="login-email" type="email" autocomplete="username" required />
        <label>Senha</label>
        <input id="login-password" type="password" autocomplete="current-password" required />
        <button class="btn btn-main" type="submit">Entrar</button>
      </form>
      <p id="login-message" class="admin-message"></p>
    </section>

    <section id="panel-card" class="admin-card hidden">
      <div class="admin-header">
        <h2>Adicionar Item</h2>
        <button id="logout-btn" class="btn btn-ghost" type="button">Sair</button>
      </div>

      <form id="item-form" class="admin-form">
        <label>Categoria</label>
        <select id="item-category" required>
          <option value="action-figure">Action Figure</option>
          <option value="chaveiros">Chaveiros</option>
          <option value="articulados">Modelos Articulados</option>
          <option value="interiores">Design de Interiores</option>
          <option value="luminarias">Luminarias</option>
          <option value="organizadores">Organizadores</option>
        </select>

        <label>Nome do item</label>
        <input id="item-title" type="text" placeholder="Ex.: Figure Dragon Slayer" required />

        <label>Imagem (upload direto)</label>
        <input id="item-file" type="file" accept="image/*" />

        <label>Ou imagem por URL (opcional)</label>
        <input id="item-image" type="text" placeholder="Ex.: https://meusite.com/minha-peca.jpg" />

        <div class="preview-wrap">
          <p class="preview-label">Preview de enquadramento</p>
          <div class="preview-card">
            <img id="item-preview-image" alt="Preview da imagem" />
          </div>
          <label for="item-position">Ajuste vertical da imagem</label>
          <input id="item-position" type="range" min="0" max="100" value="20" />
          <p id="item-position-text" class="admin-tip">Posicao atual: 20%</p>

          <label for="item-zoom">Zoom da imagem</label>
          <input id="item-zoom" type="range" min="70" max="160" value="100" />
          <p id="item-zoom-text" class="admin-tip">Zoom atual: 100%</p>
        </div>

        <button class="btn btn-main" type="submit">Salvar Item</button>
      </form>

      <p id="item-message" class="admin-message"></p>
      <p class="admin-tip">Dica: no upload, a imagem sobe para o bucket <code>catalogo</code> no Supabase Storage automaticamente.</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.config.js?v=3"></script>
  <script src="admin.js?v=3"></script>
</body>
</html>
